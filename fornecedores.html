<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coneccta Comércio — Sistema de Estoque</title>
    <link rel="shortcut icon" href="/logo/logo_icon.png" type="image/x-icon">
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="font-poppins bg-gray-50">

    <div class="flex h-screen">

        <aside class="flex flex-col w-64 bg-white border-r border-gray-200">

            <div class="p-6 border-b border-gray-200">
                <img class="w-28 mx-auto mb-2" src="/logo/logo.png" alt="logo">
                <h1 class="text-center text-lg font-medium text-blue-600">Sistema de Estoque</h1>
            </div>

            <nav class="flex-1 px-4 space-y-1">
                <a href="dashboard.html">
                    <div class="flex items-center space-x-3 cursor-pointer mt-5 hover:bg-gray-200 hover:transition hover:ease-in-out hover:duration-300 rounded-lg p-2">
                        <i class="text-black fa-solid fa-cube"></i>
                        <p class="text-black text-lg font-light">Dashboard</p>
                    </div>
                </a>
                <a href="produtos.html">
                    <div class="flex items-center space-x-3 cursor-pointer mt-2 hover:bg-gray-200 hover:transition hover:ease-in-out hover:duration-300 rounded-lg p-2">
                        <i class="text-black fa-solid fa-box"></i>
                        <p class="text-black text-lg font-light">Produtos</p>
                    </div>
                </a>
                <a href="movimentacaos.html">
                    <div class="flex items-center space-x-3 cursor-pointer mt-2 hover:bg-gray-200 hover:transition hover:ease-in-out hover:duration-300 rounded-lg p-2">
                        <i class="text-black fa-solid fa-chart-simple"></i>
                        <p class="text-black text-lg font-light">Movimentações</p>
                    </div>
                </a>
                <a href="fornecedores.html">
                    <div class="mt-2 flex items-center space-x-3 cursor-pointer bg-blue-600 hover:bg-blue-700 hover:transition hover:ease-in-out hover:duration-300 rounded-lg p-2">
                        <i class="text-white fa-solid fa-user-group"></i>
                        <p class="text-white text-lg font-light">Fornecedores</p>
                    </div>
                </a>
                <a href="relatorios.html">
                    <div class="mt-2 flex items-center space-x-3 cursor-pointer hover:bg-gray-200 hover:transition hover:ease-in-out hover:duration-300 rounded-lg p-2">
                        <i class="text-black fa-solid fa-file"></i>
                        <p class="text-black text-lg font-light">Relatórios</p>
                    </div>
                </a>
                <a href="alertas.html">
                    <div class="mt-2 flex items-center space-x-3 cursor-pointer hover:bg-gray-200 hover:transition hover:ease-in-out hover:duration-300 rounded-lg p-2">
                        <i class="text-black fa-solid fa-circle-exclamation"></i>
                        <p class="text-black text-lg font-light">Alertas</p>
                    </div>
                </a>
            </nav>

            <div class="border-t p-4 border-gray-200">
                <div class="flex items-center gap-3 p-4 bg-gray-50 w-full rounded-lg mb-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-sm flex-shrink-0">
                        <p id="user-inicial">A</p>
                    </div>
                    <div class="flex flex-col overflow-hidden">
                        <span id="user-email" class="text-sm font-bold text-slate-800 leading-tight truncate">Carregando...</span>
                        <span id="loja-nome-sidebar" class="text-xs text-slate-400 truncate">--</span>
                    </div>
                </div>
                <button onclick="window.location.href='selecionar-loja.html'"
                    class="flex items-center gap-3 px-3 py-2 bg-blue-600 hover:bg-blue-700 w-full rounded-lg transition-all duration-300 cursor-pointer text-white mb-1">
                    <i class="fa-solid fa-store text-xs"></i>
                    <span class="text-sm font-medium">Trocar loja</span>
                </button>
                <button id="btn-logout" class="flex items-center gap-3 px-3 py-2 hover:bg-red-50 w-full rounded-lg transition-all duration-300 cursor-pointer text-red-500 hover:text-red-600">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="text-sm font-medium">Sair da conta</span>
                </button>
            </div>

        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">

            <header class="p-8 flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Fornecedores</h2>
                    <p class="text-slate-600 text-lg font-light">Gerenciamento de fornecedores e contatos</p>
                </div>
                <button onclick="openModal()" class="bg-gray-600 text-white px-4 py-2 rounded-lg font-medium flex items-center cursor-pointer hover:bg-gray-800 transition-all">
                    <span class="mr-2 text-xl">+</span> Novo Fornecedor
                </button>
            </header>

            <!-- Busca -->
            <section>
                <div class="relative mx-3 mt-3">
                    <input id="searchInput" type="text" placeholder="Buscar por nome ou contato..."
                        class="w-full bg-gray-100 border-none rounded-xl py-3 pl-10 pr-4 focus:ring-3 focus:ring-gray-200 outline-none">
                    <span class="absolute left-3 top-3.5 text-gray-400"><i class="fa-solid fa-magnifying-glass"></i></span>
                </div>
            </section>

            <!-- Tabela -->
            <section class="mx-3 mt-5 bg-white rounded-xl border-[0.1rem] border-gray-200 flex-1 overflow-auto">
                <div class="overflow-hidden mt-5">
                    <table class="w-full text-left border-collapse">
                        <thead class="border-t-[0.1rem] border-b-[0.1rem] border-gray-100 hover:bg-gray-200 w-full">
                            <tr>
                                <th class="text-xs font-bold text-black px-6 py-4">Empresa</th>
                                <th class="text-xs font-bold text-black px-6 py-4">Contato</th>
                                <th class="text-xs font-bold text-black px-6 py-4">E-mail</th>
                                <th class="text-xs font-bold text-black px-6 py-4">Telefone</th>
                                <th class="text-xs font-bold text-black px-6 py-4">Endereço</th>
                                <th class="text-xs font-bold text-black px-6 py-4">Cadastro</th>
                                <th class="text-xs font-bold text-black px-6 py-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="fornecedoresTable" class="divide-y divide-gray-100 text-sm">
                            <tr>
                                <td colspan="7" class="text-center py-10 text-gray-400">Carregando fornecedores...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Modal -->
            <section>
                <div id="modal" class="fixed inset-0 backdrop-blur-xs bg-black/30 flex justify-center items-center overflow-auto p-5 hidden">
                    <div class="bg-white p-8 mb-5 rounded-lg w-[550px]">
                        <p id="modal-titulo" class="text-2xl mb-4 font-semibold">Novo Fornecedor</p>

                        <!-- Nome -->
                        <div class="mb-4">
                            <label class="text-black font-bold block mb-2">Nome da Empresa <span class="text-red-600">*</span></label>
                            <input id="f-nome" class="w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" placeholder="Ex: Tech Import Brasil">
                        </div>

                        <!-- Contato / Telefone -->
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="text-black font-bold block mb-2">Contato</label>
                                <input id="f-contato" class="w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" placeholder="Nome do responsável">
                            </div>
                            <div>
                                <label class="text-black font-bold block mb-2">Telefone</label>
                                <input id="f-telefone" class="w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" placeholder="(11) 99999-9999">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-4">
                            <label class="text-black font-bold block mb-2">E-mail</label>
                            <input id="f-email" type="email" class="w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" placeholder="contato@empresa.com">
                        </div>

                        <!-- Endereço -->
                        <div class="mb-4">
                            <label class="text-black font-bold block mb-2">Endereço</label>
                            <input id="f-endereco" class="w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" placeholder="Rua, número, cidade...">
                        </div>

                        <!-- Erro -->
                        <div id="modal-error" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-2 rounded-lg"></div>

                        <!-- Botões -->
                        <div class="flex justify-end gap-2">
                            <button id="btn-salvar" onclick="salvarFornecedor()"
                                class="bg-gray-600 text-white px-4 py-2 rounded-lg font-medium cursor-pointer hover:bg-gray-800 transition-all">
                                Cadastrar
                            </button>
                            <button onclick="closeModal()"
                                class="border border-gray-300 text-black px-4 py-2 rounded-lg font-medium cursor-pointer hover:bg-gray-200 transition-all">
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://kit.fontawesome.com/9898c47017.js" crossorigin="anonymous"></script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient(
            'https://wrajtiizvkvtzqmoicbm.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyYWp0aWl6dmt2dHpxbW9pY2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTg4NTksImV4cCI6MjA5Mzg3NDg1OX0.pjbTkVx_KGs2ZDv_vQJOPc4ODgwi0q04qA5o2eMSqLA'
        )

        // ── Sessão ──────────────────────────────────────────────
        const { data: { session } } = await supabase.auth.getSession()
        if (!session) { window.location.href = 'index.html' }
        else {
            const nome = session.user.user_metadata?.nome || session.user.email
            document.getElementById('user-email').textContent = nome
            document.getElementById('user-inicial').textContent = (nome || 'U')[0].toUpperCase()
        }


        // ── Loja selecionada ────────────────────────────────────
        const lojaId = sessionStorage.getItem('loja_id')
        const lojaNome = sessionStorage.getItem('loja_nome')
        if (!lojaId) { window.location.href = 'selecionar-loja.html' }
        if (lojaNome) {
            const el = document.getElementById('loja-nome-sidebar')
            if (el) el.textContent = lojaNome
        }

        document.getElementById('btn-logout').addEventListener('click', async () => {
            await supabase.auth.signOut()
            sessionStorage.clear()
            window.location.href = 'index.html'
        })

        // ── Variáveis ───────────────────────────────────────────
        let todosFornecedores = []
        let editandoId = null

        // ── Carregar fornecedores ───────────────────────────────
        async function carregarFornecedores() {
            const { data, error } = await supabase
                .from('fornecedores')
                .select('*')
                .eq('loja_id', lojaId)
                .order('created_at', { ascending: false })

            if (error) { console.error(error); return }
            todosFornecedores = data
            renderizarTabela(todosFornecedores)
        }

        // ── Renderizar tabela ───────────────────────────────────
        function renderizarTabela(lista) {
            const tbody = document.getElementById('fornecedoresTable')

            if (lista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-400">
                    <i class="fa-solid fa-user-group text-3xl mb-2 block"></i>
                    Nenhum fornecedor cadastrado ainda.</td></tr>`
                return
            }

            tbody.innerHTML = lista.map(f => {
                const data = new Date(f.created_at).toLocaleDateString('pt-BR')
                return `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="px-6 py-4 font-medium">${f.nome}</td>
                    <td class="px-6 py-4 text-gray-600">${f.contato || '-'}</td>
                    <td class="px-6 py-4 text-gray-600">${f.email || '-'}</td>
                    <td class="px-6 py-4 text-gray-600">${f.telefone || '-'}</td>
                    <td class="px-6 py-4 text-gray-600">${f.endereco || '-'}</td>
                    <td class="px-6 py-4 text-gray-400 text-xs">${data}</td>
                    <td class="px-6 py-4 flex gap-3">
                        <button onclick="editarFornecedor('${f.id}')"
                            class="text-blue-400 hover:text-blue-600 transition-colors cursor-pointer" title="Editar">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="excluirFornecedor('${f.id}')"
                            class="text-red-400 hover:text-red-600 transition-colors cursor-pointer" title="Excluir">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                </tr>`
            }).join('')
        }

        // ── Busca ───────────────────────────────────────────────
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase()
            const filtrados = todosFornecedores.filter(f =>
                f.nome.toLowerCase().includes(termo) ||
                (f.contato && f.contato.toLowerCase().includes(termo)) ||
                (f.email && f.email.toLowerCase().includes(termo))
            )
            renderizarTabela(filtrados)
        })

        // ── Modal ───────────────────────────────────────────────
        window.openModal = function() {
            editandoId = null
            document.getElementById('modal-titulo').textContent = 'Novo Fornecedor'
            document.getElementById('btn-salvar').textContent = 'Cadastrar'
            limparModal()
            document.getElementById('modal').classList.remove('hidden')
        }

        window.closeModal = function() {
            document.getElementById('modal').classList.add('hidden')
            limparModal()
        }

        function limparModal() {
            document.getElementById('f-nome').value = ''
            document.getElementById('f-contato').value = ''
            document.getElementById('f-telefone').value = ''
            document.getElementById('f-email').value = ''
            document.getElementById('f-endereco').value = ''
            document.getElementById('modal-error').classList.add('hidden')
            editandoId = null
        }

        // ── Editar ──────────────────────────────────────────────
        window.editarFornecedor = function(id) {
            const f = todosFornecedores.find(x => x.id === id)
            if (!f) return

            editandoId = id
            document.getElementById('modal-titulo').textContent = 'Editar Fornecedor'
            document.getElementById('btn-salvar').textContent = 'Salvar'
            document.getElementById('f-nome').value = f.nome || ''
            document.getElementById('f-contato').value = f.contato || ''
            document.getElementById('f-telefone').value = f.telefone || ''
            document.getElementById('f-email').value = f.email || ''
            document.getElementById('f-endereco').value = f.endereco || ''
            document.getElementById('modal-error').classList.add('hidden')
            document.getElementById('modal').classList.remove('hidden')
        }

        // ── Salvar ──────────────────────────────────────────────
        window.salvarFornecedor = async function() {
            const nome = document.getElementById('f-nome').value.trim()
            const contato = document.getElementById('f-contato').value.trim()
            const telefone = document.getElementById('f-telefone').value.trim()
            const email = document.getElementById('f-email').value.trim()
            const endereco = document.getElementById('f-endereco').value.trim()
            const errorDiv = document.getElementById('modal-error')

            if (!nome) {
                errorDiv.textContent = 'O nome da empresa é obrigatório.'
                errorDiv.classList.remove('hidden')
                return
            }

            errorDiv.classList.add('hidden')
            const btn = document.getElementById('btn-salvar')
            const textoOriginal = btn.textContent
            btn.textContent = 'Salvando...'
            btn.disabled = true

            const dados = { nome, contato: contato || null, telefone: telefone || null, email: email || null, endereco: endereco || null }

            let error
            if (editandoId) {
                const res = await supabase.from('fornecedores').update(dados).eq('id', editandoId)
                error = res.error
            } else {
                const res = await supabase.from('fornecedores').insert([{ loja_id: lojaId, ...dados }])
                error = res.error
            }

            btn.textContent = textoOriginal
            btn.disabled = false

            if (error) {
                errorDiv.textContent = 'Erro ao salvar: ' + error.message
                errorDiv.classList.remove('hidden')
                return
            }

            closeModal()
            await carregarFornecedores()
        }

        // ── Excluir ─────────────────────────────────────────────
        window.excluirFornecedor = async function(id) {
            if (!confirm('Tem certeza que deseja excluir este fornecedor?')) return
            const { error } = await supabase.from('fornecedores').delete().eq('id', id)
            if (error) { alert('Erro ao excluir: ' + error.message); return }
            await carregarFornecedores()
        }

        // ── Iniciar ─────────────────────────────────────────────
        await carregarFornecedores()

    </script>

</body>
</html>
