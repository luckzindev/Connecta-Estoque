<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coneccta Comércio — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Poppins', sans-serif; }

    body {
      background-color: #0f172a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.06) 0%, transparent 50%);
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
    }

    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(99,102,241,0.08);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    .input-field::placeholder { color: rgba(255,255,255,0.3); }

    .btn-login {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      transition: all 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.4);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .logo-circle {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    #error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    #loading-spinner {
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8 fade-up">
      <div class="mx-auto mb-4" style="width: 120px; height: 120px; border-radius: 16px; overflow: hidden;">
        <img src="/logo/logo.png" alt="Coneccta Comércio" style="width: 100%; height: 100%; object-fit: contain;">
      </div>
      <h1 class="text-white text-2xl font-bold">Coneccta Comércio</h1>
      <p class="text-slate-400 text-sm mt-1">Sistema de Gestão de Estoque</p>
    </div>

    <!-- Card de login -->
    <div class="card rounded-2xl p-8 fade-up delay-1">
      <h2 class="text-white text-lg font-semibold mb-1">Entrar na sua conta</h2>
      <p class="text-slate-400 text-sm mb-6">Acesse o estoque da sua loja</p>

      <!-- Mensagem de erro -->
      <div id="error-msg" class="hidden rounded-lg px-4 py-3 text-sm mb-4">
        <span id="error-text"></span>
      </div>

      <!-- Formulário -->
      <div class="space-y-4">
        <div class="fade-up delay-2">
          <label class="text-slate-300 text-sm font-medium block mb-2">E-mail</label>
          <input
            id="email"
            type="email"
            placeholder="seuemail@gmail.com"
            class="input-field w-full px-4 py-3 rounded-xl text-sm"
          />
        </div>

        <div class="fade-up delay-2">
          <label class="text-slate-300 text-sm font-medium block mb-2">Senha</label>
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="input-field w-full px-4 py-3 rounded-xl text-sm pr-12"
            />
            <button
              id="toggle-password"
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors"
            >
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="fade-up delay-3 pt-2">
          <button
            id="btn-login"
            class="btn-login w-full text-white font-semibold py-3 rounded-xl text-sm"
          >
            Entrar
          </button>
        </div>
      </div>
    </div>

    <!-- Rodapé -->
    <p class="text-center text-slate-600 text-xs mt-6 fade-up delay-3">
      Desenvolvido por Lucas Dias Torto © 2025
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://wrajtiizvkvtzqmoicbm.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyYWp0aWl6dmt2dHpxbW9pY2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTg4NTksImV4cCI6MjA5Mzg3NDg1OX0.pjbTkVx_KGs2ZDv_vQJOPc4ODgwi0q04qA5o2eMSqLA'

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Verificar se já está logado
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      window.location.href = 'selecionar-loja.html'
    }

    // Toggle senha visível
    const toggleBtn = document.getElementById('toggle-password')
    const passwordInput = document.getElementById('password')
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password'
      passwordInput.type = isPassword ? 'text' : 'password'
    })

    // Login ao apertar Enter
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fazerLogin()
    })
    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fazerLogin()
    })

    // Botão de login
    document.getElementById('btn-login').addEventListener('click', fazerLogin)

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      const errorMsg = document.getElementById('error-msg')
      const errorText = document.getElementById('error-text')
      const btn = document.getElementById('btn-login')

      // Esconder erro anterior
      errorMsg.classList.add('hidden')

      // Validação básica
      if (!email || !password) {
        errorText.textContent = 'Preencha o e-mail e a senha.'
        errorMsg.classList.remove('hidden')
        return
      }

      // Loading
      btn.disabled = true
      btn.innerHTML = '<span id="loading-spinner"></span> Entrando...'

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        btn.disabled = false
        btn.innerHTML = 'Entrar'

        if (error.message.includes('Invalid login')) {
          errorText.textContent = 'E-mail ou senha incorretos. Tente novamente.'
        } else {
          errorText.textContent = 'Erro ao entrar: ' + error.message
        }
        errorMsg.classList.remove('hidden')
        return
      }

      // Sucesso — redireciona para o dashboard
      window.location.href = 'selecionar-loja.html'
    }
  </script>

</body>
</html>
